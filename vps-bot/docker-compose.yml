services:
  truebox-bot:
    build: .
    container_name: truebox-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Sessão Playwright iFood
      - ./browser-data:/app/browser-data
      # Sessão WhatsApp Web (LocalAuth) — NÃO apague, senão precisa escanear QR de novo
      - ./wa-session:/app/wa-session
      # Screenshots locais pra debug
      - ./screenshots:/app/screenshots
    mem_limit: 2g
    shm_size: 2g
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
